<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>HEXAGES GAMES</title>

<style>
body{
background:black;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
overflow:hidden;
}

.glitch{
font-size:80px;
color:white;
position:relative;
letter-spacing:5px;
animation:glitch 1s infinite;
}

.glitch:before,
.glitch:after{
content:"HEXAGES GAMES";
position:absolute;
left:0;
}

.glitch:before{
color:red;
animation:glitchTop 1s infinite;
}

.glitch:after{
color:cyan;
animation:glitchBottom 1s infinite;
}

@keyframes glitch{
0%{transform:skew(0deg);}
20%{transform:skew(5deg);}
40%{transform:skew(-5deg);}
60%{transform:skew(3deg);}
80%{transform:skew(-3deg);}
100%{transform:skew(0deg);}
}

@keyframes glitchTop{
0%{clip-path: inset(0 0 60% 0); transform:translate(-2px,-2px);}
50%{clip-path: inset(0 0 60% 0); transform:translate(2px,2px);}
100%{clip-path: inset(0 0 60% 0); transform:translate(-2px,-2px);}
}

@keyframes glitchBottom{
0%{clip-path: inset(60% 0 0 0); transform:translate(2px,2px);}
50%{clip-path: inset(60% 0 0 0); transform:translate(-2px,-2px);}
100%{clip-path: inset(60% 0 0 0); transform:translate(2px,2px);}
}
</style>

</head>

<body>

<div class="glitch">HEXAGES GAMES</div>

</body>
</html>
